<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EchoSonic Cloud</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f8f9fa; padding-top: 50px; }
        .container { max-width: 600px; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h2 { color: #007bff; font-weight: bold; margin-bottom: 25px; }
        .status-area { margin-top: 15px; font-weight: 500; }
    </style>
</head>
<body>

<div class="container text-center">
    <h2>🎙️ EchoSonic Cloud</h2>
    
    <textarea id="textInput" class="form-control mb-3" rows="4" placeholder="Enter text here...">Hello, this is a speed test.</textarea>

    <div class="text-start">
        <label class="form-label">Voice Personality</label>
        <select id="voiceSelect" class="form-select mb-3">
            <option value="en_US-amy-low.onnx">⚡ Fast & Clear (Amy-Low)</option>
            <option value="en_US-lessac-low.onnx">⚡ High Speed (Lessac-Low)</option>
            <option value="en_US-amy-medium.onnx">Deep & Expressive (Amy-Med)</option>
            <option value="en_US-lessac-medium.onnx">Balanced (Standard-Med)</option>
            <option value="en_US-kristin-medium.onnx">Soft & Calm (Kristin-Med)</option>
        </select>

        <label class="form-label">Speaking Speed</label>
        <input type="range" id="speedInput" class="form-range" min="0.5" max="2.0" step="0.1" value="1.0">
    </div>

    <button id="generateBtn" class="btn btn-primary w-100 py-2 mt-3">🔊 Generate & Play</button>

    <div id="status" class="status-area text-muted"></div>

    <audio id="audioPlayer" controls class="w-100 mt-4">
        <source id="audioSource" src="" type="audio/wav">
        Your browser does not support the audio element.
    </audio>
</div>

<script>
    const generateBtn = document.getElementById('generateBtn');
    const status = document.getElementById('status');
    const audioPlayer = document.getElementById('audioPlayer');
    const audioSource = document.getElementById('audioSource');

    generateBtn.onclick = async () => {
        const text = document.getElementById('textInput').value;
        const voice = document.getElementById('voiceSelect').value;
        const speed = document.getElementById('speedInput').value;

        if (!text) return alert("Please enter text");

        status.innerHTML = "⏳ AI Engine Processing...";
        generateBtn.disabled = true;

        try {
            // Step 1: Tell Backend to Generate
            const response = await fetch(`https://echosonic-api.onrender.com/speak?text=${encodeURIComponent(text)}&voice=${voice}&speed=${speed}`, {
                method: 'POST'
            });

            if (response.ok) {
                status.innerHTML = "✅ Ready! Loading audio...";
                
                // Step 2: Load Audio with Cache Busting
                // We add a timestamp so the browser thinks it's a brand new file
                const audioUrl = `https://echosonic-api.onrender.com/listen?cb=${new Date().getTime()}`;
                
                // Small delay to ensure the server filesystem has finalized the file
                setTimeout(() => {
                    audioSource.src = audioUrl;
                    audioPlayer.load();
                    
                    audioPlayer.oncanplaythrough = () => {
                        audioPlayer.play();
                        status.innerHTML = "✅ Playing now.";
                        generateBtn.disabled = false;
                    };

                    audioPlayer.onerror = () => {
                        status.innerHTML = "❌ Audio load failed. Retrying...";
                        setTimeout(() => audioPlayer.load(), 1000);
                    };
                }, 800);

            } else {
                status.innerHTML = "❌ AI Engine Error.";
                generateBtn.disabled = false;
            }
        } catch (err) {
            status.innerHTML = "❌ Connection Error.";
            generateBtn.disabled = false;
        }
    };
</script>

</body>
</html>
