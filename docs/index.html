<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EchoSonic Cloud</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f0f2f5; padding-top: 60px; }
        .app-card { max-width: 550px; margin: auto; background: white; padding: 40px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); }
        .btn-main { background: #0d6efd; color: white; font-weight: bold; padding: 12px; border-radius: 12px; transition: 0.3s; }
        .btn-main:hover { background: #0b5ed7; transform: scale(1.02); }
        #status { font-size: 0.9rem; font-weight: 600; margin-top: 15px; }
    </style>
</head>
<body>

<div class="container">
    <div class="app-card text-center">
        <h2 class="mb-4">🎙️ EchoSonic Cloud</h2>
        
        <textarea id="textInput" class="form-control mb-4" rows="4" placeholder="Enter text to speak...">Hello, this is a speed and stability test.</textarea>

        <div class="text-start mb-4">
            <label class="form-label text-muted fw-bold small">Voice Personality</label>
            <select id="voiceSelect" class="form-select mb-3">
                <option value="en_US-amy-low.onnx">⚡ High Speed (Amy-Low)</option>
                <option value="en_US-lessac-low.onnx">⚡ High Speed (Lessac-Low)</option>
                <option value="en_US-amy-medium.onnx">Deep/Expressive (Amy-Medium)</option>
                <option value="en_US-kristin-medium.onnx">Soft/Calm (Kristin-Medium)</option>
            </select>

            <label class="form-label text-muted fw-bold small">Speaking Speed</label>
            <input type="range" id="speedInput" class="form-range" min="0.5" max="2.0" step="0.1" value="1.0">
        </div>

        <button id="generateBtn" class="btn btn-main w-100 mb-2">🔊 Generate & Play</button>
        <div id="status"></div>

        <audio id="audioPlayer" controls class="w-100 mt-4 shadow-sm" style="border-radius: 30px;">
            <source id="audioSource" src="" type="audio/wav">
        </audio>
    </div>
</div>

<script>
    const btn = document.getElementById('generateBtn');
    const status = document.getElementById('status');
    const player = document.getElementById('audioPlayer');
    const source = document.getElementById('audioSource');

    btn.onclick = async () => {
        const text = document.getElementById('textInput').value;
        const voice = document.getElementById('voiceSelect').value;
        const speed = document.getElementById('speedInput').value;

        if(!text) return;

        status.innerHTML = "<span class='text-primary'>⏳ Engine Thinking...</span>";
        btn.disabled = true;

        try {
            const api = "https://echosonic-api.onrender.com";
            const res = await fetch(`${api}/speak?text=${encodeURIComponent(text)}&voice=${voice}&speed=${speed}`, { method: 'POST' });

            if (res.ok) {
                status.innerHTML = "<span class='text-success'>✅ Loading Audio...</span>";
                
                // Cache Buster: ?cb= ensures we don't play the old file
                const audioUrl = `${api}/listen?cb=${new Date().getTime()}`;
                
                // Allow a small delay for file settling
                setTimeout(() => {
                    source.src = audioUrl;
                    player.load();
                    
                    player.oncanplaythrough = () => {
                        player.play();
                        status.innerHTML = "<span class='text-success'>✅ Playing!</span>";
                        btn.disabled = false;
                    };
                }, 1000);
            }
        } catch (e) {
            status.innerHTML = "<span class='text-danger'>❌ Connection Error</span>";
            btn.disabled = false;
        }
    };
</script>
</body>
</html>
