<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EchoSonic Cloud</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f0f2f5; padding-top: 50px; }
        .app-card { max-width: 500px; margin: auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .btn-generate { background: #007bff; color: white; font-weight: bold; border-radius: 12px; transition: 0.3s; }
        .btn-generate:hover { background: #0056b3; transform: translateY(-2px); }
        #status { font-weight: 600; font-size: 0.9rem; margin-top: 15px; }
    </style>
</head>
<body>

<div class="container">
    <div class="app-card text-center">
        <h2 class="mb-4">🎙️ EchoSonic Cloud</h2>
        
        <textarea id="textInput" class="form-control mb-3" rows="3" placeholder="Enter text...">Hello, testing stability.</textarea>

        <div class="text-start mb-3">
            <label class="small fw-bold text-muted">Voice</label>
            <select id="voiceSelect" class="form-select mb-3">
                <option value="en_US-amy-low.onnx">⚡ Fast Amy (Low)</option>
                <option value="en_US-lessac-low.onnx">⚡ Fast Lessac (Low)</option>
                <option value="en_US-amy-medium.onnx">Amy (Medium)</option>
            </select>

            <label class="small fw-bold text-muted">Speed</label>
            <input type="range" id="speedInput" class="form-range" min="0.5" max="2.0" step="0.1" value="1.0">
        </div>

        <button id="generateBtn" class="btn btn-generate w-100 py-2">🔊 Generate & Play</button>
        <div id="status"></div>

        <audio id="audioPlayer" controls class="w-100 mt-4">
            <source id="audioSource" src="" type="audio/wav">
        </audio>
    </div>
</div>

<script>
    const btn = document.getElementById('generateBtn');
    const status = document.getElementById('status');
    const player = document.getElementById('audioPlayer');
    const source = document.getElementById('audioSource');

    btn.onclick = async () => {
        const text = document.getElementById('textInput').value;
        const voice = document.getElementById('voiceSelect').value;
        const speed = document.getElementById('speedInput').value;

        status.innerHTML = "<span class='text-primary'>⏳ Processing...</span>";
        btn.disabled = true;

        try {
            const api = "https://echosonic-api.onrender.com";
            // 1. Wait for Python/Go to confirm file is done
            const res = await fetch(`${api}/speak?text=${encodeURIComponent(text)}&voice=${voice}&speed=${speed}`, { method: 'POST' });

            if (res.ok) {
                status.innerHTML = "<span class='text-success'>✅ Loading...</span>";
                
                // 2. Cache Buster: Ensures browser fetches the FRESH file
                const audioUrl = `${api}/listen?t=${new Date().getTime()}`;
                
                // 3. 1-second delay for Render's disk to sync
                setTimeout(() => {
                    source.src = audioUrl;
                    player.load();
                    player.oncanplaythrough = () => {
                        player.play();
                        status.innerHTML = "<span class='text-success'>✅ Playing!</span>";
                        btn.disabled = false;
                    };
                }, 1000);
            }
        } catch (e) {
            status.innerHTML = "<span class='text-danger'>❌ Error</span>";
            btn.disabled = false;
        }
    };
</script>
</body>
</html>
