<!DOCTYPE html>
<html>
<head><title>EchoSonic Cloud</title></head>
<body style="font-family:sans-serif; background:#f4f7f6; display:flex; justify-content:center; padding:40px;">
    <div style="background:white; padding:30px; border-radius:12px; box-shadow:0 4px 10px rgba(0,0,0,0.1); width:100%; max-width:500px;">
        <h2>🎙️ EchoSonic Cloud</h2>
        <textarea id="text" style="width:100%; height:120px; margin-bottom:15px;"></textarea>
        <button id="btn" onclick="generate()" style="width:100%; padding:15px; background:#007bff; color:white; border:none; border-radius:8px; cursor:pointer;">🔊 Generate & Play</button>
        <div id="status" style="margin-top:15px; text-align:center;"></div>
        <audio id="audio" controls style="width:100%; margin-top:20px;"></audio>
    </div>

    <script>
        const API_BASE = "https://echosonic-api.onrender.com"; 

        async function generate() {
            const btn = document.getElementById('btn');
            const status = document.getElementById('status');
            const audio = document.getElementById('audio');
            
            btn.disabled = true;
            status.innerText = "⏳ Processing...";

            const params = new URLSearchParams({
                'text': document.getElementById('text').value,
                'voice': 'en_US-amy-medium.onnx',
                'speed': '1.0',
                'noise': '0.6'
            });

            try {
                const res = await fetch(`${API_BASE}/speak`, { method: 'POST', body: params });

                if (res.ok) {
                    status.innerText = "✅ Audio Ready!";
                    // Force re-fetch of the file
                    const audioUrl = `${API_BASE}/listen?t=${Date.now()}`;
                    audio.src = audioUrl;
                    audio.load(); // Forces browser to check file length
                    
                    audio.oncanplaythrough = () => {
                        audio.play().catch(() => {
                            status.innerText = "✅ Ready! Click Play button.";
                        });
                    };
                }
            } catch (e) {
                status.innerText = "❌ Connection Error";
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
