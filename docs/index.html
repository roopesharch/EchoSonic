<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EchoSonic</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f8f9fa; }
        .card { border-radius: 12px; border: none; max-width: 500px; margin: 50px auto; }
    </style>
</head>
<body class="p-3">
    <div class="card shadow p-4">
        <h2 class="text-center mb-4">🎙️ EchoSonic</h2>
        <textarea id="text" class="form-control mb-3" rows="3">Let's try Danny and Kathleen!</textarea>
        
        <select id="voice" class="form-select mb-4">
            <option value="en_US-amy-low.onnx">Amy (Fast Female)</option>
            <option value="en_US-ryan-low.onnx">Ryan (Clear Male)</option>
            <option value="en_US-danny-low.onnx">Danny (Natural Male)</option>
            <option value="en_US-kathleen-low.onnx">Kathleen (Soft Female)</option>
            <option value="en_US-lessac-low.onnx">Lessac (Formal)</option>
        </select>

        <button id="go" class="btn btn-primary w-100 fw-bold py-2 shadow-sm">🔊 Speak</button>
        <div id="status" class="text-center text-muted mt-2 small"></div>
        <audio id="player" controls class="w-100 mt-4 d-none"></audio>
    </div>

    <script>
        const btn = document.getElementById('go');
        const status = document.getElementById('status');
        const player = document.getElementById('player');

        btn.onclick = async () => {
            btn.disabled = true;
            status.innerText = "⏳ Processing voice...";
            try {
                const text = document.getElementById('text').value;
                const voice = document.getElementById('voice').value;
                const res = await fetch(`/speak?text=${encodeURIComponent(text)}&voice=${voice}`, {method:'POST'});
                if(res.ok) {
                    status.innerText = "✅ Ready!";
                    player.classList.remove('d-none');
                    player.src = `/listen?cb=${Date.now()}`;
                    player.play();
                } else {
                    status.innerText = "❌ Engine Error.";
                }
            } catch(e) { status.innerText = "❌ Connection failed."; }
            btn.disabled = false;
        };
    </script>
</body>
</html>
