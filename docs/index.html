<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>EchoSonic Cloud</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light p-5 text-center">
    <div class="container bg-white p-4 rounded shadow" style="max-width: 500px;">
        <h2 class="mb-4">🎙️ EchoSonic</h2>
        <textarea id="text" class="form-control mb-3" rows="3">Hello world. This is a Gold Master test.</textarea>
        <select id="voice" class="form-select mb-3">
            <option value="en_US-amy-low.onnx">Amy (Low)</option>
            <option value="en_US-lessac-low.onnx">Lessac (Low)</option>
        </select>
        <button id="go" class="btn btn-primary w-100 py-2 fw-bold">🔊 Generate & Play</button>
        <div id="msg" class="mt-3 small fw-bold text-primary"></div>
        <audio id="player" controls class="w-100 mt-4"><source id="src"></audio>
    </div>
    <script>
        const btn = document.getElementById('go');
        const msg = document.getElementById('msg');
        const player = document.getElementById('player');
        const source = document.getElementById('src');

        btn.onclick = async () => {
            msg.innerText = "⏳ Processing...";
            btn.disabled = true;
            try {
                const api = window.location.origin; 
                const res = await fetch(`${api}/speak?text=${encodeURIComponent(document.getElementById('text').value)}&voice=${document.getElementById('voice').value}`, {method:'POST'});
                
                if(res.ok) {
                    msg.innerText = "✅ Done! Loading audio...";
                    // Small delay to ensure disk sync before browser fetch
                    setTimeout(() => {
                        const timestamp = new Date().getTime();
                        source.src = `${api}/listen?cb=${timestamp}`;
                        player.load();
                        
                        const playPromise = player.play();
                        if (playPromise !== undefined) {
                            playPromise.then(() => {
                                msg.innerText = "✅ Success!";
                            }).catch(error => {
                                msg.innerText = "⏸️ Ready. Click play to listen.";
                            });
                        }
                        btn.disabled = false;
                    }, 500);
                } else {
                    msg.innerText = "❌ Engine Error";
                    btn.disabled = false;
                }
            } catch(e) {
                msg.innerText = "❌ Connection Error";
                btn.disabled = false;
            }
        };
    </script>
</body>
</html>
