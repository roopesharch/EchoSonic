<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>EchoSonic AI Voice</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    font-family: Arial, sans-serif;
    background: #111;
    color: white;
    text-align: center;
    padding: 40px;
}

.container {
    max-width: 600px;
    margin: auto;
}

textarea {
    width: 100%;
    height: 120px;
    padding: 12px;
    font-size: 16px;
    border-radius: 8px;
    border: none;
    resize: none;
}

select, button {
    margin-top: 15px;
    padding: 10px 15px;
    font-size: 16px;
    border-radius: 8px;
    border: none;
}

button {
    background: #00c3ff;
    color: black;
    cursor: pointer;
    margin-right: 10px;
}

button:hover {
    background: #00a0d6;
}

#downloadBtn {
    background: #00ff95;
    display: none;
}

#downloadBtn:hover {
    background: #00d17c;
}

#status {
    margin-top: 15px;
    font-size: 14px;
    color: #aaa;
}

audio {
    margin-top: 20px;
    width: 100%;
}
</style>
</head>

<body>

<div class="container">
<h1>🎙 EchoSonic AI Voice</h1>

<textarea id="textInput" placeholder="Enter your text here..."></textarea>
<div id="charCount">0 characters</div>

<select id="voiceSelect">
    <option value="en_US-amy-low.onnx">Amy (Female)</option>
    <option value="en_US-ryan-low.onnx">Ryan (Male)</option>
</select>

<br>

<button onclick="speak()">Generate Voice</button>
<button id="downloadBtn" onclick="downloadAudio()">Download</button>

<div id="status"></div>

<audio id="audioPlayer" controls></audio>
</div>

<script>
const textInput = document.getElementById("textInput");
const charCount = document.getElementById("charCount");
const statusDiv = document.getElementById("status");
const audioPlayer = document.getElementById("audioPlayer");
const downloadBtn = document.getElementById("downloadBtn");

let currentAudioBlob = null;

textInput.addEventListener("input", () => {
    charCount.innerText = textInput.value.length + " characters";
});

async function speak() {
    const text = textInput.value.trim();
    const voice = document.getElementById("voiceSelect").value;

    if (!text) {
        alert("Please enter some text.");
        return;
    }

    statusDiv.innerText = "⏳ Generating voice...";
    audioPlayer.src = "";
    downloadBtn.style.display = "none";

    try {
        const response = await fetch(
            "https://echosonic.onrender.com/synthesize?text="
            + encodeURIComponent(text)
            + "&voice=" + encodeURIComponent(voice)
        );

        if (!response.ok) {
            throw new Error("Server error");
        }

        const blob = await response.blob();
        currentAudioBlob = blob;

        const url = URL.createObjectURL(blob);
        audioPlayer.src = url;
        audioPlayer.play();

        downloadBtn.style.display = "inline-block";
        statusDiv.innerText = "✅ Voice generated successfully!";
    } catch (error) {
        statusDiv.innerText = "❌ Error generating voice.";
    }
}

function downloadAudio() {
    if (!currentAudioBlob) return;

    const timestamp = new Date().toISOString().replace(/[:.]/g, "-");
    const fileName = "EchoSonic_" + timestamp + ".wav";

    const link = document.createElement("a");
    link.href = URL.createObjectURL(currentAudioBlob);
    link.download = fileName;
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
}
</script>

</body>
</html>
