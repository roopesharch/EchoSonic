<button id="adminLoginBtn" onclick="loginAdmin()" style="background:#1e293b; font-size:12px; padding:5px 10px;">Admin Login</button>

<script>
// ... (keep existing variables)
let adminToken = localStorage.getItem("echo_admin_token");

// Update UI if already logged in
if (adminToken) {
    document.getElementById("textInput").removeAttribute("maxlength");
    document.getElementById("adminLoginBtn").innerText = "Admin: ON";
    document.getElementById("adminLoginBtn").style.background = "#059669";
}

async function loginAdmin() {
    const code = prompt("Enter 6-digit Authenticator Code:");
    if (!code) return;

    try {
        const response = await fetch(`${BACKEND_URL}/verify-otp?code=${code}`);
        const data = await response.json();

        if (data.success) {
            localStorage.setItem("echo_admin_token", data.token);
            alert("Authenticated! Character limits removed.");
            location.reload(); // Refresh to update UI
        } else {
            alert("Invalid code.");
        }
    } catch (err) {
        alert("Verification failed. Check backend.");
    }
}
