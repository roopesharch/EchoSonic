syntax = "proto3";
package voice;
option go_package = "./proto";

service VoiceService {
  rpc Speak (SpeakRequest) returns (SpeakResponse);
}

message SpeakRequest {
  string text = 1;
  string voice = 2;
  float speed = 3;
  float noise = 4;
}

message SpeakResponse {
  bool success = 1;
  bytes audio_data = 2;
}